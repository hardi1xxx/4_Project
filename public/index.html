<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard Monitoring</title>
<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --panel-2: #273449;
    --border: #334155;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #38bdf8;
    --accent-2: #22c55e;
    --danger: #f87171;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }
  header h1 {
    margin: 0;
    font-size: 19px;
    font-weight: 600;
  }
  header .sub {
    color: var(--muted);
    font-size: 13px;
    margin-top: 2px;
  }
  .tabs {
    display: flex;
    gap: 6px;
    padding: 14px 24px 0;
    flex-wrap: wrap;
  }
  .tab {
    padding: 9px 18px;
    border-radius: 8px 8px 0 0;
    background: var(--panel);
    color: var(--muted);
    cursor: pointer;
    border: 1px solid var(--border);
    border-bottom: none;
    font-size: 14px;
    font-weight: 500;
  }
  .tab.active {
    background: var(--panel-2);
    color: var(--accent);
    border-color: var(--accent);
  }
  .content {
    padding: 0 24px 30px;
  }
  .toolbar {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 0 8px 8px 8px;
    padding: 14px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  .toolbar input[type="text"] {
    flex: 1;
    min-width: 200px;
    padding: 9px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
  }
  select {
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    max-width: 180px;
  }
  button {
    padding: 9px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--panel-2);
    color: var(--text);
    cursor: pointer;
    font-size: 13px;
  }
  button.primary {
    background: var(--accent);
    color: #06222f;
    border-color: var(--accent);
    font-weight: 600;
  }
  .filters-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 10px;
    width: 100%;
  }
  .meta {
    margin: 12px 0;
    color: var(--muted);
    font-size: 13px;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  .table-wrap {
    overflow: auto;
    border: 1px solid var(--border);
    border-radius: 8px;
    max-height: 65vh;
  }
  table {
    border-collapse: collapse;
    width: 100%;
    font-size: 13px;
  }
  thead th {
    position: sticky;
    top: 0;
    background: var(--panel-2);
    color: var(--accent);
    text-align: left;
    padding: 10px 12px;
    border-bottom: 2px solid var(--border);
    white-space: nowrap;
  }
  tbody td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  tbody tr:hover {
    background: rgba(56, 189, 248, 0.07);
  }
  .empty, .error, .loading {
    padding: 40px;
    text-align: center;
    color: var(--muted);
  }
  .error { color: var(--danger); }
  .badge {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 20px;
    background: var(--panel-2);
    font-size: 12px;
    color: var(--accent-2);
    border: 1px solid var(--border);
  }
  footer {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    padding: 14px;
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>📊 Dashboard Monitoring</h1>
    <div class="sub">Data live dari Google Sheets — MBB, OLO, HEM, FBB, PT2</div>
  </div>
  <button id="refreshBtn">🔄 Refresh Data</button>
</header>

<div class="tabs" id="tabs"></div>

<div class="content">
  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="Cari di semua kolom..." />
    <select id="filterColumn">
      <option value="">+ Tambah filter kolom...</option>
    </select>
    <button class="primary" id="searchBtn">Cari</button>
    <button id="clearBtn">Bersihkan</button>
    <div class="filters-row" id="activeFilters"></div>
  </div>

  <div class="meta">
    <div id="metaInfo">Memuat data...</div>
    <div id="lastUpdated"></div>
  </div>

  <div class="table-wrap">
    <div id="tableArea" class="loading">Memuat data...</div>
  </div>
</div>

<footer>Dashboard Monitoring · Auto-refresh tiap 60 detik</footer>

<script>
const SHEETS = ["MBB", "OLO", "HEM", "FBB", "PT2"];
let currentSheet = SHEETS[0];
let activeFilters = {}; // { kolom: nilai }
let currentColumns = [];

const tabsEl = document.getElementById("tabs");
const searchInput = document.getElementById("searchInput");
const filterColumnSelect = document.getElementById("filterColumn");
const activeFiltersEl = document.getElementById("activeFilters");
const tableArea = document.getElementById("tableArea");
const metaInfo = document.getElementById("metaInfo");
const lastUpdatedEl = document.getElementById("lastUpdated");

function renderTabs() {
  tabsEl.innerHTML = "";
  SHEETS.forEach((s) => {
    const div = document.createElement("div");
    div.className = "tab" + (s === currentSheet ? " active" : "");
    div.textContent = s;
    div.onclick = () => {
      currentSheet = s;
      activeFilters = {};
      searchInput.value = "";
      renderTabs();
      loadData();
    };
    tabsEl.appendChild(div);
  });
}

function buildQuery(refresh) {
  const params = new URLSearchParams();
  if (searchInput.value.trim()) params.set("search", searchInput.value.trim());
  Object.entries(activeFilters).forEach(([col, val]) => {
    params.set("filter_" + col, val);
  });
  if (refresh) params.set("refresh", "1");
  return params.toString();
}

async function loadData(refresh = false) {
  tableArea.innerHTML = '<div class="loading">Memuat data...</div>';
  metaInfo.textContent = "Memuat...";
  try {
    const qs = buildQuery(refresh);
    const res = await fetch(`/api/data/${currentSheet}?${qs}`);
    const json = await res.json();

    if (json.error) {
      tableArea.innerHTML = `<div class="error">⚠️ ${json.error}</div>`;
      metaInfo.textContent = "Gagal memuat data";
      return;
    }

    currentColumns = json.columns;
    populateFilterColumnOptions(json.columns);
    renderActiveFilters();
    renderTable(json.columns, json.rows);

    metaInfo.innerHTML = `Menampilkan <span class="badge">${json.total}</span> baris pada sheet <b>${json.sheet}</b>`;
    lastUpdatedEl.textContent = "Terakhir diambil: " + new Date(json.lastUpdated).toLocaleString("id-ID");
  } catch (err) {
    tableArea.innerHTML = `<div class="error">⚠️ Gagal memuat data: ${err.message}</div>`;
  }
}

function populateFilterColumnOptions(columns) {
  filterColumnSelect.innerHTML = '<option value="">+ Tambah filter kolom...</option>';
  columns.forEach((c) => {
    if (activeFilters[c] !== undefined) return; // sudah aktif
    const opt = document.createElement("option");
    opt.value = c;
    opt.textContent = c;
    filterColumnSelect.appendChild(opt);
  });
}

async function addFilter(column) {
  if (!column) return;
  try {
    const res = await fetch(`/api/options/${currentSheet}/${encodeURIComponent(column)}`);
    const json = await res.json();
    const value = json.options[0] || "";
    activeFilters[column] = value;
    renderActiveFilters(json.options, column);
  } catch (err) {
    console.error(err);
  }
}

function renderActiveFilters(optionsForNew, newCol) {
  activeFiltersEl.innerHTML = "";
  Object.keys(activeFilters).forEach(async (col) => {
    const wrap = document.createElement("div");
    wrap.style.display = "flex";
    wrap.style.gap = "4px";
    wrap.style.alignItems = "center";

    const label = document.createElement("span");
    label.textContent = col + ":";
    label.style.fontSize = "12px";
    label.style.color = "var(--muted)";

    const sel = document.createElement("select");
    sel.dataset.col = col;

    let options = (col === newCol && optionsForNew) ? optionsForNew : null;
    if (!options) {
      const res = await fetch(`/api/options/${currentSheet}/${encodeURIComponent(col)}`);
      const json = await res.json();
      options = json.options;
    }
    options.forEach((o) => {
      const opt = document.createElement("option");
      opt.value = o;
      opt.textContent = o;
      if (o === activeFilters[col]) opt.selected = true;
      sel.appendChild(opt);
    });
    sel.onchange = () => {
      activeFilters[col] = sel.value;
      loadData();
    };

    const removeBtn = document.createElement("button");
    removeBtn.textContent = "✕";
    removeBtn.style.padding = "4px 8px";
    removeBtn.onclick = () => {
      delete activeFilters[col];
      renderActiveFilters();
      populateFilterColumnOptions(currentColumns);
      loadData();
    };

    wrap.appendChild(label);
    wrap.appendChild(sel);
    wrap.appendChild(removeBtn);
    activeFiltersEl.appendChild(wrap);
  });
  populateFilterColumnOptions(currentColumns);
}

function renderTable(columns, rows) {
  if (!rows || rows.length === 0) {
    tableArea.innerHTML = '<div class="empty">Tidak ada data yang cocok.</div>';
    return;
  }
  let html = "<table><thead><tr>";
  columns.forEach((c) => (html += `<th>${escapeHtml(c)}</th>`));
  html += "</tr></thead><tbody>";
  rows.forEach((row) => {
    html += "<tr>";
    columns.forEach((c) => {
      html += `<td>${escapeHtml(row[c] ?? "")}</td>`;
    });
    html += "</tr>";
  });
  html += "</tbody></table>";
  tableArea.innerHTML = html;
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

document.getElementById("searchBtn").onclick = () => loadData();
searchInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") loadData();
});
document.getElementById("clearBtn").onclick = () => {
  searchInput.value = "";
  activeFilters = {};
  renderActiveFilters();
  loadData();
};
document.getElementById("refreshBtn").onclick = () => loadData(true);
filterColumnSelect.onchange = () => {
  const col = filterColumnSelect.value;
  filterColumnSelect.value = "";
  if (col) addFilter(col);
};

renderTabs();
loadData();
setInterval(() => loadData(), 60000);
</script>
</body>
</html>
